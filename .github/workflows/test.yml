name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install per-service dependencies
        run: |
          for svc in \
            market-data \
            technical-analysis \
            ml-prediction \
            ranking-engine \
            signal-engine \
            strategy-engine \
            portfolio-optimizer \
            research-engine; do
            echo "── installing $svc ──"
            pip install -q -r services/$svc/requirements.txt
          done
          pip install -q pytest pytest-asyncio

      - name: Run unit tests
        run: make test

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: "**/.pytest_cache"
          retention-days: 7

  typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: TypeScript check
        run: npm run --prefix frontend typecheck 2>/dev/null || npx --prefix frontend tsc --noEmit
