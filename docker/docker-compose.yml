name: stockai

x-py-common: &py-common
  env_file: ../.env
  depends_on:
    redis:
      condition: service_started
    postgres:
      condition: service_healthy
  networks: [stockai-net]
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    env_file: ../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["127.0.0.1:5432:5432"]
    networks: [stockai-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockai -d stockai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    #ports: ["6379:6379"]
    networks: [stockai-net]

  market-data:
    <<: *py-common
    build:
      context: ..
      dockerfile: services/market-data/Dockerfile
    #ports: ["8001:8001"]
    volumes:
      - datavol:/data

  technical-analysis:
    <<: *py-common
    build:
      context: ..
      dockerfile: services/technical-analysis/Dockerfile
    #ports: ["8002:8002"]

  ml-prediction:
    <<: *py-common
    build:
      context: ..
      dockerfile: services/ml-prediction/Dockerfile
    #ports: ["8003:8003"]
    volumes:
      - datavol:/data

  ranking-engine:
    <<: *py-common
    build:
      context: ..
      dockerfile: services/ranking-engine/Dockerfile
    #ports: ["8004:8004"]

  signal-engine:
    <<: *py-common
    build:
      context: ..
      dockerfile: services/signal-engine/Dockerfile
    #ports: ["8005:8005"]

  strategy-engine:
    <<: *py-common
    build:
      context: ..
      dockerfile: services/strategy-engine/Dockerfile
    #ports: ["8006:8006"]

  portfolio-optimizer:
    <<: *py-common
    build:
      context: ..
      dockerfile: services/portfolio-optimizer/Dockerfile
    #ports: ["8007:8007"]

  research-engine:
    <<: *py-common
    build:
      context: ..
      dockerfile: services/research-engine/Dockerfile
    #ports: ["8008:8008"]

  api-gateway:
    <<: *py-common
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    ports: ["127.0.0.1:8000:8000"]
    depends_on:
      - market-data
      - technical-analysis
      - ml-prediction
      - ranking-engine
      - signal-engine
      - strategy-engine
      - portfolio-optimizer
      - research-engine

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    env_file: ../.env
    ports: ["127.0.0.1:3000:3000"]
    depends_on: [api-gateway]
    networks: [stockai-net]
    restart: unless-stopped

volumes:
  datavol:
  pgdata:

networks:
  stockai-net:
    driver: bridge
